name: Test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, mbstring, dom, xml, curl, zip, gd, intl
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: php -v && composer --version
      - run: composer validate --no-check-publish
      - name: Install PHP dependencies
        id: composer_install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          composer install --no-interaction --prefer-dist --no-progress 2>&1 | tee composer-install.log
          exit ${PIPESTATUS[0]}
      - name: Upload Composer install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composer-install-log
          path: composer-install.log
          if-no-files-found: error
      - name: Fail after Composer diagnostics
        if: steps.composer_install.outcome == 'failure'
        run: exit 1
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - name: Run PHPUnit
        id: phpunit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          php artisan test --configuration=phpunit.visual.xml 2>&1 | tee phpunit.log
          exit ${PIPESTATUS[0]}
      - name: Upload PHPUnit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-log
          path: phpunit.log
          if-no-files-found: error
      - name: Fail after PHPUnit diagnostics
        if: steps.phpunit.outcome == 'failure'
        run: exit 1
